basePath: /v1
definitions:
  api.UpdatePostPayload:
    properties:
      content:
        maxLength: 1000
        type: string
      title:
        maxLength: 100
        type: string
    type: object
  api.commentPayload:
    properties:
      content:
        maxLength: 300
        type: string
    required:
    - content
    type: object
  github_com_na1tto_go-social_internal_store.Comment:
    properties:
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      post_id:
        type: integer
      user:
        $ref: '#/definitions/github_com_na1tto_go-social_internal_store.User'
      user_id:
        type: integer
    type: object
  github_com_na1tto_go-social_internal_store.Post:
    properties:
      comments:
        items:
          $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Comment'
        type: array
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      tags:
        items:
          type: string
        type: array
      title:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/github_com_na1tto_go-social_internal_store.User'
      user_id:
        type: integer
      version:
        type: integer
    type: object
  github_com_na1tto_go-social_internal_store.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: Luiz (na1tto)
    url: http://www.swagger.io/support
  description: This is my swagger documentation for the Go-Social Project!
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Go-Social API
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Fetches the user feed with flags for filtering
      produces:
      - application/json
      responses:
        "500":
          description: Internal Server Error
          schema: {}
      summary: Shows the server health
      tags:
      - Health
  /posts/:
    post:
      consumes:
      - application/json
      description: Creates a post in the database
      parameters:
      - description: Post Infos
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Post'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Post'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Creates a post
      tags:
      - Posts
  /posts/{postId}:
    delete:
      consumes:
      - application/json
      description: Deletes a post by ID
      parameters:
      - description: Post ID
        in: path
        name: postId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Success
        "404":
          description: Post not found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Deletes a Post
      tags:
      - Posts
    get:
      consumes:
      - application/json
      description: Retrieves a post by ID
      parameters:
      - description: Post ID
        in: path
        name: postId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Post'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Post not found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Retrieves a Post
      tags:
      - Posts
    patch:
      consumes:
      - application/json
      description: Updates a post by ID
      parameters:
      - description: Post ID
        in: path
        name: postId
        required: true
        type: integer
      - description: Fields to Update
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/api.UpdatePostPayload'
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Post'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Post not found
          schema: {}
        "409":
          description: Version conflict
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Updates a post
      tags:
      - Posts
    post:
      consumes:
      - application/json
      description: Comments on a post by its ID
      parameters:
      - description: Post ID
        in: path
        name: postId
        required: true
        type: integer
      - description: Comment Field
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/api.commentPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Success
          schema:
            $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Comment'
        "400":
          description: Bad Request
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Creates a Comment
      tags:
      - Posts
  /users/{id}:
    get:
      consumes:
      - application/json
      description: Fetches a user profile via its ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/github_com_na1tto_go-social_internal_store.User'
        "400":
          description: Bad Request
          schema: {}
        "404":
          description: Not Found
          schema: {}
        "500":
          description: Internal Server Error
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Fetches a user profile
      tags:
      - Users
  /users/{userId}/follow:
    put:
      consumes:
      - application/json
      description: Follows a user by ID
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User followed
          schema:
            type: string
        "400":
          description: User payload missing
          schema: {}
        "404":
          description: User not found
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Follows a User
      tags:
      - Users
  /users/{userId}/unfollow:
    put:
      consumes:
      - application/json
      description: Unollows a user by ID
      parameters:
      - description: User ID
        in: path
        name: userId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User unfollowed
          schema:
            type: string
        "400":
          description: User payload missing
          schema: {}
        "404":
          description: User not found
          schema: {}
      security:
      - ApiKeyAuth: []
      summary: Unfollows a User
      tags:
      - Users
  /users/feed:
    get:
      consumes:
      - application/json
      description: Fetches the user feed with flags for filtering
      parameters:
      - description: Search filter for the feed
        in: query
        name: search
        type: string
      - description: Field for sorting data
        in: query
        name: sort
        type: string
      - description: Field for pagination limit
        in: query
        name: limit
        type: string
      - description: Field for pagination offset
        in: query
        name: offset
        type: string
      - description: Field for filtering by tags
        in: query
        name: tags
        type: string
      - description: Field for filtering until a date
        in: query
        name: since
        type: string
      - description: Field for filtering since a date
        in: query
        name: until
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_na1tto_go-social_internal_store.Post'
            type: array
        "500":
          description: Internal Server Error
          schema: {}
      summary: Fetches a feed for a user
      tags:
      - Users
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
